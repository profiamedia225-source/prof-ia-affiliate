<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROF IA MEDIA - Paiement</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:420px;
            background:white;
            border-radius:18px;
            padding:35px;
            box-shadow:0 15px 40px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            color:#1b1b1b;
            margin-bottom:8px;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#0c8ce9;
            color:white;
            font-size:17px;
            cursor:pointer;
        }

        button:hover{
            background:#0879ca;
        }
    </style>
</head>

<body>

<div class="card">

<h1>PROF IA MEDIA</h1>

<p>Paiement sécurisé</p>

<input type="text" placeholder="Nom complet">

<input type="email" placeholder="Adresse e-mail">

<input type="tel" placeholder="Téléphone">

<a href="https://paystack.shop/pay/profiamedia" target="_blank">
    <a href="https://paystack.shop/pay/profiamedia" target="_blank" style="display:block;text-decoration:none;">
    <button type="button">Payer maintenant</button>
</a>
</a>

</div>

</body>

</html>
